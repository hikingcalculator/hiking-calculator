<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackpackRation · Строгий порядок · Стильный фон</title>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ (ДЕСКТОПНАЯ ВЕРСИЯ ПО УМОЛЧАНИЮ) ========== */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            transition: background 0.5s ease;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: 140px 140px;
            background-repeat: repeat;
            opacity: 0.3;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .background-layer.water {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140"><path d="M10 40 Q 25 25, 40 40 T 70 40 T 100 40" stroke="%231f4a82" stroke-width="3" fill="none" opacity="0.8"/><path d="M20 80 Q 40 65, 60 80 T 100 80 T 130 80" stroke="%23255b9c" stroke-width="2.5" fill="none"/><circle cx="50" cy="20" r="4" fill="%233072b5" opacity="0.7"/><circle cx="110" cy="60" r="5" fill="%231f4a82" opacity="0.8"/><circle cx="30" cy="110" r="3" fill="%23255b9c"/><path d="M80 110 Q 95 100, 110 110" stroke="%233072b5" stroke-width="2" fill="none"/><path d="M120 20 Q 130 30, 120 40" stroke="%23255b9c" stroke-width="2" fill="none"/><polygon points="20,130 24,122 30,130" fill="%231f4a82" opacity="0.8"/></svg>');
            background-color: #b3d4f0;
        }
        .background-layer.mountain {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140"><polygon points="20,60 35,20 50,60" fill="%233a424b" opacity="0.9"/><polygon points="45,80 65,30 85,80" fill="%234f5b66" opacity="0.8"/><polygon points="80,50 100,10 120,50" fill="%235a6877" opacity="0.9"/><polygon points="10,110 30,70 50,110" fill="%232c353d" opacity="0.8"/><polygon points="90,110 115,60 130,110" fill="%233f4a54" opacity="0.7"/><polygon points="110,40 125,20 140,40" fill="%234f5b66"/><polygon points="60,130 75,100 90,130" fill="%232c353d"/></svg>');
            background-color: #7f8c8d;
        }
        .background-layer.forest {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140"><polygon points="20,80 30,40 40,80" fill="%231b5e20" opacity="0.9"/><polygon points="15,100 30,70 45,100" fill="%232e7d32"/><polygon points="50,60 65,20 80,60" fill="%233c8d40" opacity="0.8"/><polygon points="70,90 85,50 100,90" fill="%234caf50" opacity="0.7"/><polygon points="100,40 115,10 130,40" fill="%231b5e20"/><polygon points="110,70 120,40 130,70" fill="%232e7d32"/><circle cx="35" cy="30" r="3" fill="%234caf50"/><circle cx="115" cy="110" r="4" fill="%233c8d40"/></svg>');
            background-color: #81c784;
        }
        .background-layer.desert {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140"><path d="M10 110 Q 30 90, 50 110 T 90 110 T 130 110" stroke="%23a77b2b" stroke-width="4" fill="none" opacity="0.9"/><path d="M20 80 Q 40 60, 60 80 T 100 80" stroke="%23b38f3a" stroke-width="3" fill="none"/><circle cx="45" cy="30" r="7" fill="%23c7a252" opacity="0.8"/><circle cx="100" cy="50" r="9" fill="%23a77b2b" opacity="0.7"/><polygon points="80,20 84,30 75,30" fill="%239f7c3a" opacity="0.8"/><polygon points="115,70 120,82 108,82" fill="%23b38f3a"/><polygon points="30,120 35,130 25,130" fill="%23c7a252"/><polygon points="125,30 130,40 118,40" fill="%23a77b2b"/></svg>');
            background-color: #f4d03f;
        }

        /* Панель переключения версий */
        .view-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: flex-end;
        }
        .view-toggle button {
            background: #f7b731;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #1d4d2d;
            cursor: pointer;
            box-shadow: 0 4px 0 #9f711f, 0 5px 10px rgba(0,0,0,0.2);
            transition: 0.07s linear;
            border: 2px solid #ffe9b6;
        }
        .view-toggle button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #9f711f, 0 5px 10px rgba(0,0,0,0.2);
        }

        .card {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 250, 235, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 30, 0, 0.7), 0 10px 20px rgba(0,0,0,0.3);
            padding: 30px;
            border: 2px solid rgba(235, 206, 159, 0.8);
            transition: box-shadow 0.3s;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 2.5rem;
            color: #1e3c2c;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px dashed #a57c5c;
            padding-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        h1 span {
            font-size: 2rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(217, 197, 166, 0.85);
            padding: 25px;
            border-radius: 60px;
            margin-bottom: 20px;
            align-items: flex-end;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 8px 12px rgba(0,20,0,0.25);
            backdrop-filter: blur(4px);
        }

        .field {
            flex: 1 1 150px;
        }

        .field label {
            display: block;
            font-weight: 600;
            color: #2b4f2b;
            margin-bottom: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(255,255,200,0.5);
        }

        .field select, .field input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            background: #fef9e8;
            font-size: 1rem;
            font-weight: 500;
            color: #1f3b2a;
            border: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,20,0,0.3);
        }

        .field select:focus, .field input:focus {
            outline: none;
            border-color: #f7b731;
            background: #ffffff;
            box-shadow: 0 6px 12px rgba(247,183,49,0.4);
        }

        button {
            background: #f7b731;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1d4d2d;
            cursor: pointer;
            box-shadow: 0 8px 0 #9f711f, 0 10px 20px rgba(0,0,0,0.25);
            transition: 0.07s linear;
            border: 2px solid #ffe9b6;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #9f711f, 0 5px 15px rgba(0,0,0,0.2);
        }

        .type-hint {
            background: rgba(236, 217, 180, 0.95);
            border-radius: 40px;
            padding: 12px 24px;
            margin-bottom: 20px;
            color: #2b4f2b;
            font-weight: 500;
            font-size: 1rem;
            box-shadow: inset 0 1px 6px #a57c5c, 0 4px 8px rgba(0,20,0,0.25);
            backdrop-filter: blur(2px);
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #283b1e;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 1px 1px 2px #f5e2c1;
        }

        .menu-days {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .day-card {
            background: rgba(252, 249, 236, 0.96);
            border-radius: 35px;
            padding: 20px;
            box-shadow: 0 10px 0 #8f6f4b, 0 12px 25px -8px #2d3e2d, 0 0 0 2px #e5caa0 inset;
            border: 2px solid #e5caa0;
            transition: transform 0.2s;
        }
        .day-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 0 #8f6f4b, 0 15px 30px -8px #1d2e1d;
        }

        .day-card h3 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            color: #613d23;
            border-left: 8px solid #f7b731;
            padding-left: 15px;
        }

        .meal-block {
            margin-bottom: 16px;
            background: rgba(234, 219, 189, 0.9);
            border-radius: 25px;
            padding: 12px 15px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.2);
        }

        .meal-title {
            font-weight: 700;
            color: #1e4a2a;
            margin-bottom: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fcf9ec;
            border-radius: 40px;
            padding: 6px 12px;
            margin-bottom: 6px;
            box-shadow: 0 2px 0 #8f6f4b, 0 3px 8px rgba(0,0,0,0.15);
            border: 1px solid #e5caa0;
            transition: background 0.2s;
        }
        .product-item:hover {
            background: #fff6df;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .product-name {
            font-weight: 600;
            color: #1d3a1d;
        }

        .product-weight {
            color: #944e1f;
            font-weight: 600;
            background: #f7e5c2;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .edit-btn {
            background: #f7b731;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 2px 0 #9f711f;
            transition: 0.07s;
            color: #1d4d2d;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .edit-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .total-section {
            margin-top: 40px;
            background: rgba(217, 197, 166, 0.9);
            border-radius: 50px;
            padding: 25px 30px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.15), 0 8px 12px rgba(0,20,0,0.25);
            backdrop-filter: blur(2px);
        }

        .total-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1d3a1d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .total-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .total-item {
            background: #fcf9ec;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 1.1rem;
            color: #1e3c2c;
            box-shadow: 0 4px 0 #8f6f4b, 0 5px 12px rgba(0,0,0,0.15);
            border: 1px solid #e5caa0;
        }

        .total-item .gram {
            float: right;
            font-size: 1.2rem;
            font-weight: 600;
            color: #944e1f;
        }

        .footer-note {
            margin-top: 30px;
            background: rgba(179, 139, 95, 0.9);
            border-radius: 50px;
            padding: 14px 28px;
            color: #fff9e0;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 4px 0 #6b4f3a, 0 6px 12px rgba(0,0,0,0.25);
        }

        .product-panel {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 340px;
            background: #f5ebd2;
            box-shadow: 4px 0 20px rgba(0,20,0,0.5);
            border-radius: 0 32px 32px 0;
            padding: 24px 16px;
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
            border-right: 3px solid #a57c5c;
            backdrop-filter: blur(4px);
        }

        .product-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1d4d2d;
        }

        .close-panel {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #7b5a3a;
            padding: 0 10px;
            box-shadow: none;
        }

        .product-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card {
            background: #fcf9ec;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 0 #8f6f4b, 0 5px 12px rgba(0,0,0,0.15);
            border: 1px solid #e5caa0;
        }

        .product-card .product-name {
            font-weight: 600;
            color: #1e3c2c;
            font-size: 1rem;
            flex: 2;
        }

        .product-weight {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: flex-end;
        }

        .product-weight input {
            width: 70px;
            padding: 6px 8px;
            border: none;
            border-radius: 40px;
            background: #fef9e8;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f3b2a;
            border: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,20,0,0.2);
            text-align: center;
        }

        .product-weight input:focus {
            outline: none;
            border-color: #f7b731;
            background: #ffffff;
        }

        .product-weight span {
            font-size: 0.9rem;
            color: #944e1f;
            font-weight: 600;
            min-width: 30px;
        }

        .menu-toggle {
            position: fixed;
            top: 30px;
            left: 30px;
            background: #f7b731;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #9f711f, 0 10px 20px rgba(0,0,0,0.25);
            border: 2px solid #ffe9b6;
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.07s linear;
            color: #1d4d2d;
        }

        .menu-toggle:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #9f711f, 0 5px 15px rgba(0,0,0,0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 900;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .temp-select {
            position: fixed;
            background: white;
            border-radius: 30px;
            padding: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 1200;
            border: 2px solid #f7b731;
            font-size: 1rem;
        }

        /* ========== МОБИЛЬНАЯ ВЕРСИЯ (КЛАСС НА BODY) ========== */
        body.mobile-layout {
            padding: 8px;
        }
        body.mobile-layout .card {
            padding: 16px;
            border-radius: 24px;
        }
        body.mobile-layout h1 {
            font-size: 1.8rem;
            gap: 8px;
        }
        body.mobile-layout h1 span {
            font-size: 1.5rem;
        }
        body.mobile-layout .form-row {
            flex-direction: column;
            padding: 16px;
            border-radius: 30px;
        }
        body.mobile-layout .field {
            width: 100%;
        }
        body.mobile-layout .field label {
            font-size: 0.9rem;
        }
        body.mobile-layout .field select,
        body.mobile-layout .field input {
            padding: 14px 16px;
            font-size: 1rem;
        }
        body.mobile-layout button {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 #9f711f, 0 8px 16px rgba(0,0,0,0.25);
        }
        body.mobile-layout .menu-days {
            grid-template-columns: 1fr;
        }
        body.mobile-layout .day-card h3 {
            font-size: 1.4rem;
        }
        body.mobile-layout .product-item {
            padding: 10px 12px;
        }
        body.mobile-layout .edit-btn {
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
        }
        body.mobile-layout .total-section {
            padding: 16px;
        }
        body.mobile-layout .total-list {
            grid-template-columns: 1fr;
        }
        body.mobile-layout .product-panel {
            width: 100%;
            border-radius: 0;
        }
        body.mobile-layout .view-toggle button {
            padding: 12px 16px;
            font-size: 1rem;
            flex: 1;
        }
        body.mobile-layout .view-toggle {
            gap: 8px;
        }
        body.mobile-layout .menu-toggle {
            top: 16px;
            left: 16px;
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>
    <div class="background-layer" id="bgLayer"></div>

    <button class="menu-toggle" id="menuToggle">📦</button>

    <div class="product-panel" id="productPanel">
        <div class="panel-header">
            <span>🍏 Редактор продуктов</span>
            <button class="close-panel" id="closePanel">✕</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="card">
        <div class="view-toggle">
            <button id="desktopView">💻 Компьютер</button>
            <button id="mobileView">📱 Телефон</button>
        </div>

        <h1>
            <span>🥾</span> BackpackRation · Походное меню
            <span>⚖️</span>
        </h1>

        <div class="form-row">
            <div class="field">
                <label>🌲 Тип похода</label>
                <select id="tripType">
                    <option value="water">Водный</option>
                    <option value="mountain" selected>Горный</option>
                    <option value="forest">Лесной</option>
                    <option value="desert">Пустынный</option>
                </select>
            </div>
            <div class="field">
                <label>📆 Дней</label>
                <input type="number" id="daysCount" min="1" max="14" value="7">
            </div>
            <div class="field">
                <label>👥 Участников</label>
                <input type="number" id="membersCount" min="1" max="20" value="4">
            </div>
            <div class="field">
                <label>🚶 Км/день</label>
                <input type="number" id="kmPerDay" min="5" max="50" value="20">
            </div>
            <div class="field">
                <label>⛰️ Высота (м)</label>
                <input type="number" id="altitude" min="0" max="5000" value="1000">
            </div>
            <div class="field">
                <label>🔥 Способ</label>
                <select id="cookingMethod">
                    <option value="gas">Газ</option>
                    <option value="fire">Костёр</option>
                </select>
            </div>
            <button id="generateBtn">✨ Сгенерировать</button>
        </div>

        <div class="type-hint" id="typeHint">
            ⛰️ Коррекция веса по нагрузке и высоте.
        </div>

        <div id="menuArea">
            <div class="result-title">🍽️ Меню по дням (продукты можно заменять)</div>
            <div class="menu-days" id="menuGrid"></div>
        </div>

        <div class="total-section" id="totalSection" style="display: none;">
            <div class="total-title">📦 Общий вес продуктов на всех</div>
            <div class="total-list" id="totalList"></div>
        </div>

        <div class="footer-note">
            ⚡ Нажмите ✎ рядом с продуктом, чтобы заменить его. Веса можно менять в левой панели.
        </div>
    </div>

    <script>
        (function() {
            // ---------- РАСШИРЕННЫЙ СПИСОК ПРОДУКТОВ ----------
            const products = {
                // Каши для завтрака
                oatmeal: { name: "Овсянка", baseWeight: 30, category: "porridge" },
                semolina: { name: "Манка", baseWeight: 30, category: "porridge" },
                cornPorridge: { name: "Кукурузная каша", baseWeight: 30, category: "porridge" },
                wheatPorridge: { name: "Пшеничная каша", baseWeight: 30, category: "porridge" },
                barleyPorridge: { name: "Ячневая каша", baseWeight: 30, category: "porridge" },
                ricePorridge: { name: "Рисовая каша", baseWeight: 30, category: "porridge" },
                
                // Гарниры (для обеда/ужина)
                perk: { name: "Перловка", baseWeight: 50, category: "garnish" },
                millet: { name: "Пшено", baseWeight: 50, category: "garnish" },
                buckwheat: { name: "Гречка", baseWeight: 50, category: "garnish" },
                rice: { name: "Рис", baseWeight: 50, category: "garnish" },
                macaroni: { name: "Макароны (перья)", baseWeight: 50, category: "garnish" },
                spaghetti: { name: "Спагетти", baseWeight: 50, category: "garnish" },
                
                // Супы
                soupChicken: { name: "Суп куриный (пакет)", baseWeight: 30, category: "soup" },
                soupBorscht: { name: "Суп борщ (пакет)", baseWeight: 30, category: "soup" },
                soupPea: { name: "Суп гороховый (пакет)", baseWeight: 30, category: "soup" },
                soupKharcho: { name: "Суп харчо (пакет)", baseWeight: 30, category: "soup" },
                
                // Белок
                subMeat: { name: "Сублимированное мясо", baseWeight: 15, category: "protein" },
                cannedMeat: { name: "Тушёнка (говяжья)", baseWeight: 50, category: "protein" },
                cannedFish: { name: "Консервы рыбные", baseWeight: 40, category: "protein" },
                
                // Намазки/колбасы/сыры
                pate: { name: "Паштет", baseWeight: 30, category: "spread" },
                cheese: { name: "Сыр (твёрдый)", baseWeight: 40, category: "spread" },
                processedCheese: { name: "Сыр плавленый", baseWeight: 30, category: "spread" },
                sausage: { name: "Колбаса варёная", baseWeight: 40, category: "spread" },
                salami: { name: "Салями", baseWeight: 35, category: "spread" },
                
                // Овощи сублимированные
                subVeg: { name: "Сублимированные овощи", baseWeight: 5, category: "veg" },
                subBeet: { name: "Свекла сублимированная", baseWeight: 5, category: "veg" },
                subPea: { name: "Горошек сублимированный", baseWeight: 5, category: "veg" },
                
                // Молочка
                milkPowder: { name: "Сухое молоко", baseWeight: 8, category: "milk" },
                
                // Хлеб
                bread: { name: "Хлебец", baseWeight: 20, category: "bread" },
                crackers: { name: "Сухарики", baseWeight: 15, category: "bread" },
                
                // Сладкое
                chocolate: { name: "Шоколад", baseWeight: 15, category: "sweet" },
                sweets: { name: "Конфеты (карамель)", baseWeight: 15, category: "sweet" },
                cookies: { name: "Печенье", baseWeight: 20, category: "sweet" },
                
                // Фрукты/орехи
                nuts: { name: "Орехи (смесь)", baseWeight: 20, category: "fruitNuts" },
                driedFruits: { name: "Курага/чернослив", baseWeight: 15, category: "fruitNuts" },
                driedBananas: { name: "Сушеные бананы", baseWeight: 10, category: "fruitNuts" },
                driedApples: { name: "Сушеные яблоки", baseWeight: 10, category: "fruitNuts" },
                candiedFruits: { name: "Цукаты", baseWeight: 10, category: "fruitNuts" },
                
                // Приправы (без бульона – бульон теперь отдельно)
                soySauce: { name: "Соевый соус", baseWeight: 10, category: "condiment" },
                salt: { name: "Соль", baseWeight: 3, category: "condiment" },
                spices: { name: "Специи (смесь)", baseWeight: 2, category: "condiment" },
                ketchup: { name: "Кетчуп", baseWeight: 15, category: "condiment" },
                
                // Бульон (теперь отдельно, только для обеда)
                broth: { name: "Бульон", baseWeight: 5, category: "condiment" },
                
                // Чай, кофе, сахар
                tea: { name: "Чай", baseWeight: 2, category: "tea" },
                coffee: { name: "Кофе", baseWeight: 2, category: "tea" },
                sugar: { name: "Сахар", baseWeight: 10, category: "sugar" }
            };

            // Категоризированные массивы
            const porridgesList = [products.oatmeal, products.semolina, products.cornPorridge, products.wheatPorridge, products.barleyPorridge, products.ricePorridge];
            const breakfastAddons = [products.driedBananas, products.driedApples, products.candiedFruits, products.driedFruits, products.nuts];
            const garnishes = [products.macaroni, products.rice, products.buckwheat, products.perk, products.millet, products.spaghetti];
            const soups = [products.soupChicken, products.soupBorscht, products.soupPea, products.soupKharcho];
            const subVegs = [products.subVeg, products.subBeet, products.subPea];
            const sweetsList = [products.chocolate, products.sweets, products.cookies];
            const condiments = [products.soySauce, products.salt, products.spices, products.ketchup]; // broth исключён
            const proteinList = [products.subMeat, products.cannedMeat, products.cannedFish];
            const spreadList = [products.cheese, products.processedCheese, products.sausage, products.salami, products.pate];
            const broths = [products.broth]; // отдельно для обеда

            // Глобальные данные
            let allDaysMeals = [];
            let currentMembers = 4;
            let lastUsedDay = new Map(); // для отслеживания повторов

            // ---------- ФОН ----------
            const bgLayer = document.getElementById('bgLayer');
            const tripSelect = document.getElementById('tripType');

            function updateBackground(type) {
                bgLayer.className = 'background-layer';
                bgLayer.classList.add(type);
            }
            tripSelect.addEventListener('change', (e) => updateBackground(e.target.value));
            updateBackground(tripSelect.value);

            // ---------- ПАНЕЛЬ ПРОДУКТОВ ----------
            const productGrid = document.getElementById('productGrid');
            function renderProductPanel() {
                productGrid.innerHTML = '';
                Object.keys(products).forEach(key => {
                    const product = products[key];
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <span class="product-name">${product.name}</span>
                        <div class="product-weight">
                            <input type="number" value="${product.baseWeight}" step="1" min="0" data-product-key="${key}" class="weight-input">
                            <span>г</span>
                        </div>
                    `;
                    productGrid.appendChild(card);
                });

                document.querySelectorAll('.weight-input').forEach(input => {
                    input.addEventListener('change', function(e) {
                        const key = this.dataset.productKey;
                        const newWeight = parseInt(this.value, 10);
                        if (!isNaN(newWeight) && newWeight >= 0) {
                            products[key].baseWeight = newWeight;
                        }
                    });
                });
            }

            // ---------- КОЭФФИЦИЕНТЫ ----------
            function getLoadFactors(km, altitude, method) {
                let baseFactor = 1.0;
                if (km > 25) baseFactor += 0.1;
                if (km > 35) baseFactor += 0.1;
                if (method === 'fire') baseFactor += 0.05;

                const altitudeFactor = altitude > 2000 ? 1.2 : 1.0;

                return {
                    garnish: baseFactor * (altitude > 2000 ? 0.9 : 1.0),
                    protein: baseFactor * altitudeFactor,
                    spread: baseFactor * altitudeFactor,
                    porridge: baseFactor,
                    milk: baseFactor,
                    fruitNuts: baseFactor,
                    bread: baseFactor,
                    soup: baseFactor,
                    condiment: baseFactor,
                    tea: baseFactor,
                    sugar: baseFactor,
                    sweet: baseFactor,
                    veg: baseFactor
                };
            }

            function varyWeight(base, factor = 1.0) {
                const variation = 0.85 + Math.random() * 0.3;
                return Math.round(base * factor * variation);
            }

            // Функция выбора продукта с учётом истории (избегаем повторов подряд)
            function selectProductFromList(list, usedNames, dayIndex, lastUsedMap, maxAttempts = 20) {
                let available = list.filter(p => !usedNames.has(p.name));
                if (available.length === 0) return null;

                let candidates = available.filter(p => lastUsedMap.get(p.name) !== dayIndex - 1);
                if (candidates.length > 0) {
                    return candidates[Math.floor(Math.random() * candidates.length)];
                }
                return available[Math.floor(Math.random() * available.length)];
            }

            // ----- ФИКСИРОВАННЫЙ ПОРЯДОК ДЛЯ КАЖДОГО ПРИЁМА -----
            const breakfastOrder = ['porridge','milk','fruitNuts','bread','spread','sweet','tea','sugar'];
            const lunchOrder = ['soup','garnish','protein','veg','spread','condiment','bread','tea','sugar','sweet'];
            const dinnerOrder = ['garnish','protein','veg','spread','condiment','bread','tea','sugar','sweet'];

            function sortMealProducts(productsArray, order) {
                return productsArray.sort((a, b) => {
                    const ia = order.indexOf(a.category);
                    const ib = order.indexOf(b.category);
                    if (ia === -1 && ib === -1) return 0;
                    if (ia === -1) return 1;
                    if (ib === -1) return -1;
                    return ia - ib;
                });
            }

            // Генерация одного приёма с учётом дня
            function generateMeal(mealType, factors, usedNames, dayIndex) {
                const mealProducts = [];

                function addProduct(product, categoryFactor, cat) {
                    if (!product) return;
                    const weight = varyWeight(product.baseWeight, factors[categoryFactor] || 1.0);
                    mealProducts.push({
                        name: product.name,
                        weight: weight,
                        category: cat || product.category
                    });
                    usedNames.add(product.name);
                }

                if (mealType === 'breakfast') {
                    addProduct(products.bread, 'bread');
                    addProduct(products.tea, 'tea');
                    addProduct(products.sugar, 'sugar');
                    const sweet = selectProductFromList(sweetsList, usedNames, dayIndex, lastUsedDay);
                    addProduct(sweet, 'sweet');
                    
                    // Каша из специального списка
                    const porridge = selectProductFromList(porridgesList, usedNames, dayIndex, lastUsedDay);
                    addProduct(porridge, 'porridge');
                    
                    addProduct(products.milkPowder, 'milk');
                    const addon = selectProductFromList(breakfastAddons, usedNames, dayIndex, lastUsedDay);
                    addProduct(addon, 'fruitNuts');
                    const cheeseSpread = selectProductFromList(spreadList, usedNames, dayIndex, lastUsedDay);
                    addProduct(cheeseSpread, 'spread');

                    return sortMealProducts(mealProducts, breakfastOrder);
                }
                else if (mealType === 'lunch') {
                    addProduct(products.bread, 'bread');
                    addProduct(products.tea, 'tea');
                    addProduct(products.sugar, 'sugar');
                    const sweet = selectProductFromList(sweetsList, usedNames, dayIndex, lastUsedDay);
                    addProduct(sweet, 'sweet');

                    const soup = selectProductFromList(soups, usedNames, dayIndex, lastUsedDay);
                    addProduct(soup, 'soup');
                    const garnish = selectProductFromList(garnishes, usedNames, dayIndex, lastUsedDay);
                    addProduct(garnish, 'garnish');
                    const protein = selectProductFromList(proteinList, usedNames, dayIndex, lastUsedDay);
                    addProduct(protein, 'protein');
                    const veg = selectProductFromList(subVegs, usedNames, dayIndex, lastUsedDay);
                    addProduct(veg, 'veg');
                    const spread = selectProductFromList(spreadList, usedNames, dayIndex, lastUsedDay);
                    addProduct(spread, 'spread');
                    
                    // Добавляем обычную приправу (из condiments, без бульона)
                    const condiment = selectProductFromList(condiments, usedNames, dayIndex, lastUsedDay);
                    addProduct(condiment, 'condiment');
                    
                    // Добавляем бульон отдельно (гарантированно в каждом обеде)
                    const broth = selectProductFromList(broths, usedNames, dayIndex, lastUsedDay);
                    addProduct(broth, 'condiment');

                    return sortMealProducts(mealProducts, lunchOrder);
                }
                else { // dinner
                    addProduct(products.bread, 'bread');
                    addProduct(products.tea, 'tea');
                    addProduct(products.sugar, 'sugar');
                    const sweet = selectProductFromList(sweetsList, usedNames, dayIndex, lastUsedDay);
                    addProduct(sweet, 'sweet');

                    let garnish = selectProductFromList(garnishes, usedNames, dayIndex, lastUsedDay);
                    addProduct(garnish, 'garnish');
                    const protein = selectProductFromList(proteinList, usedNames, dayIndex, lastUsedDay);
                    addProduct(protein, 'protein');
                    const veg = selectProductFromList(subVegs, usedNames, dayIndex, lastUsedDay);
                    addProduct(veg, 'veg');
                    if (Math.random() > 0.5) {
                        const extra = selectProductFromList(spreadList, usedNames, dayIndex, lastUsedDay);
                        addProduct(extra, 'spread');
                    }
                    // Приправа (без бульона – бульон только в обеде)
                    const condiment = selectProductFromList(condiments, usedNames, dayIndex, lastUsedDay);
                    addProduct(condiment, 'condiment');

                    return sortMealProducts(mealProducts, dinnerOrder);
                }
            }

            function generateRandomDay(factors, dayIndex) {
                const usedNames = new Set();
                const breakfast = generateMeal('breakfast', factors, usedNames, dayIndex);
                const lunch = generateMeal('lunch', factors, usedNames, dayIndex);
                const dinner = generateMeal('dinner', factors, usedNames, dayIndex);

                // Обновляем карту последнего использования
                const allProducts = [...breakfast, ...lunch, ...dinner];
                allProducts.forEach(p => {
                    lastUsedDay.set(p.name, dayIndex);
                });

                return {
                    breakfast: breakfast,
                    lunch: lunch,
                    dinner: dinner,
                    all: allProducts,
                    factors: factors
                };
            }

            // Замена продукта (без изменения истории)
            function replaceProduct(dayIndex, mealType, productIndex, newProductKey) {
                const day = allDaysMeals[dayIndex];
                const newProd = products[newProductKey];
                const factors = day.factors;
                const category = newProd.category;
                const factor = factors[category] || 1.0;
                const newWeight = Math.round(newProd.baseWeight * factor);

                day[mealType][productIndex] = {
                    name: newProd.name,
                    weight: newWeight,
                    category: category
                };

                if (mealType === 'breakfast') {
                    day[mealType] = sortMealProducts(day[mealType], breakfastOrder);
                } else if (mealType === 'lunch') {
                    day[mealType] = sortMealProducts(day[mealType], lunchOrder);
                } else if (mealType === 'dinner') {
                    day[mealType] = sortMealProducts(day[mealType], dinnerOrder);
                }

                day.all = [...day.breakfast, ...day.lunch, ...day.dinner];
                renderAllDays();
                updateTotalList();
            }

            // Рендер дней
            function renderAllDays() {
                const menuGrid = document.getElementById('menuGrid');
                menuGrid.innerHTML = '';

                allDaysMeals.forEach((day, idx) => {
                    const card = document.createElement('div');
                    card.className = 'day-card';
                    card.innerHTML = `<h3>День ${idx+1}</h3>`;

                    card.appendChild(createMealBlock('🌄 Завтрак', 'breakfast', day.breakfast, idx));
                    card.appendChild(createMealBlock('☀️ Обед', 'lunch', day.lunch, idx));
                    card.appendChild(createMealBlock('🌙 Ужин', 'dinner', day.dinner, idx));

                    menuGrid.appendChild(card);
                });
            }

            function createMealBlock(title, mealType, productsList, dayIndex) {
                const block = document.createElement('div');
                block.className = 'meal-block';
                block.innerHTML = `<div class="meal-title">${title}</div>`;

                productsList.forEach((prod, prodIdx) => {
                    const item = document.createElement('div');
                    item.className = 'product-item';
                    item.innerHTML = `
                        <div class="product-info">
                            <span class="product-name">${prod.name}</span>
                            <span class="product-weight">${prod.weight} г</span>
                        </div>
                        <button class="edit-btn" data-day="${dayIndex}" data-meal="${mealType}" data-index="${prodIdx}">✎</button>
                    `;
                    block.appendChild(item);
                });

                return block;
            }

            function updateTotalList() {
                const members = parseInt(document.getElementById('membersCount').value) || 4;
                const totalMap = new Map();

                allDaysMeals.forEach(day => {
                    day.all.forEach(product => {
                        const name = product.name;
                        const weightPerPerson = product.weight;
                        const totalWeight = weightPerPerson * members;
                        totalMap.set(name, (totalMap.get(name) || 0) + totalWeight);
                    });
                });

                // Добавляем соль и специи, если их не было (как запас)
                if (!totalMap.has('Соль')) totalMap.set('Соль', 3 * members * allDaysMeals.length);
                if (!totalMap.has('Специи (смесь)')) totalMap.set('Специи (смесь)', 2 * members * allDaysMeals.length);

                const sortedNames = Array.from(totalMap.keys()).sort((a,b) => a.localeCompare(b, 'ru'));
                const totalListDiv = document.getElementById('totalList');
                totalListDiv.innerHTML = '';
                sortedNames.forEach(name => {
                    const weight = Math.round(totalMap.get(name));
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'total-item';
                    itemDiv.innerHTML = `${name} <span class="gram">${weight} г</span>`;
                    totalListDiv.appendChild(itemDiv);
                });

                document.getElementById('totalSection').style.display = 'block';
            }

            function generateAndRender() {
                const days = parseInt(document.getElementById('daysCount').value) || 7;
                currentMembers = parseInt(document.getElementById('membersCount').value) || 4;
                const km = parseFloat(document.getElementById('kmPerDay').value) || 20;
                const altitude = parseFloat(document.getElementById('altitude').value) || 1000;
                const method = document.getElementById('cookingMethod').value;

                const factors = getLoadFactors(km, altitude, method);
                document.getElementById('typeHint').innerHTML = `🏔️ Коррекция: углеводы ${Math.round(factors.garnish*100)}%, белки ${Math.round(factors.protein*100)}%, жиры ${Math.round(factors.spread*100)}%.`;

                // Сбрасываем историю при новой генерации
                lastUsedDay.clear();
                allDaysMeals = [];
                for (let i = 0; i < days; i++) {
                    allDaysMeals.push(generateRandomDay(factors, i));
                }

                renderAllDays();
                updateTotalList();
            }

            // Обработка замены продукта
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('edit-btn')) {
                    e.preventDefault();
                    const btn = e.target;
                    const dayIndex = parseInt(btn.dataset.day);
                    const mealType = btn.dataset.meal;
                    const prodIndex = parseInt(btn.dataset.index);

                    const select = document.createElement('select');
                    select.className = 'temp-select';
                    Object.keys(products).forEach(key => {
                        const opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = products[key].name;
                        select.appendChild(opt);
                    });

                    const rect = btn.getBoundingClientRect();
                    select.style.left = rect.left + 'px';
                    select.style.top = (rect.bottom + 5) + 'px';

                    const handleSelect = () => {
                        const newKey = select.value;
                        replaceProduct(dayIndex, mealType, prodIndex, newKey);
                        if (document.body.contains(select)) document.body.removeChild(select);
                    };

                    select.addEventListener('change', handleSelect);

                    setTimeout(() => {
                        const closeOnClickOutside = (event) => {
                            if (!select.contains(event.target) && event.target !== btn) {
                                if (document.body.contains(select)) {
                                    document.body.removeChild(select);
                                }
                                document.removeEventListener('click', closeOnClickOutside);
                            }
                        };
                        document.addEventListener('click', closeOnClickOutside);
                    }, 10);

                    document.body.appendChild(select);
                    select.focus();
                }
            });

            // Управление панелью
            const panel = document.getElementById('productPanel');
            const overlay = document.getElementById('overlay');
            const menuToggle = document.getElementById('menuToggle');
            const closePanel = document.getElementById('closePanel');

            function openPanel() {
                panel.classList.add('open');
                overlay.classList.add('show');
            }
            function closePanelFn() {
                panel.classList.remove('open');
                overlay.classList.remove('show');
            }

            menuToggle.addEventListener('click', openPanel);
            closePanel.addEventListener('click', closePanelFn);
            overlay.addEventListener('click', closePanelFn);

            // ---------- ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ДЕСКТОПНОЙ И МОБИЛЬНОЙ ВЕРСИЯМИ ----------
            const desktopBtn = document.getElementById('desktopView');
            const mobileBtn = document.getElementById('mobileView');

            function setDesktop() {
                document.body.classList.remove('mobile-layout');
                localStorage.setItem('backpackRationLayout', 'desktop');
            }
            function setMobile() {
                document.body.classList.add('mobile-layout');
                localStorage.setItem('backpackRationLayout', 'mobile');
            }

            desktopBtn.addEventListener('click', setDesktop);
            mobileBtn.addEventListener('click', setMobile);

            // Восстанавливаем сохранённый выбор
            const savedLayout = localStorage.getItem('backpackRationLayout');
            if (savedLayout === 'mobile') {
                setMobile();
            } else {
                setDesktop(); // по умолчанию десктоп
            }

            // Инициализация
            renderProductPanel();
            generateAndRender();

            document.getElementById('generateBtn').addEventListener('click', generateAndRender);
        })();
    </script>
</body>
