<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackpackRation · Походный калькулятор (случайное меню)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #2b5a3a 0%, #1e7b4b 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 250, 235, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 30, 0, 0.6);
            padding: 30px;
            border: 2px solid #f5e2c1;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 2.5rem;
            color: #1e3c2c;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px dashed #a57c5c;
            padding-bottom: 15px;
        }
        h1 span {
            font-size: 2rem;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #d9c5a6;
            padding: 25px 25px;
            border-radius: 60px;
            margin-bottom: 20px;
            align-items: flex-end;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }
        .field {
            flex: 1 1 150px;
        }
        .field label {
            display: block;
            font-weight: 600;
            color: #2b4f2b;
            margin-bottom: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .field select, .field input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            background: #fef9e8;
            font-size: 1rem;
            font-weight: 500;
            color: #1f3b2a;
            border: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,20,0,0.2);
        }
        .field select:focus, .field input:focus {
            outline: none;
            border-color: #f7b731;
            background: #ffffff;
        }
        button {
            background: #f7b731;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1d4d2d;
            cursor: pointer;
            box-shadow: 0 8px 0 #9f711f, 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.07s linear;
            border: 2px solid #ffe9b6;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #9f711f, 0 5px 15px rgba(0,0,0,0.2);
        }
        .type-hint {
            background: #ecd9b4;
            border-radius: 40px;
            padding: 12px 24px;
            margin-bottom: 20px;
            color: #2b4f2b;
            font-weight: 500;
            font-size: 1rem;
            box-shadow: inset 0 1px 6px #a57c5c;
        }
        .result-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #283b1e;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-days {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .day-card {
            background: #fcf9ec;
            border-radius: 35px;
            padding: 20px;
            box-shadow: 0 10px 0 #8f6f4b, 0 12px 25px -8px #2d3e2d;
            border: 2px solid #e5caa0;
        }
        .day-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.6rem;
            color: #613d23;
            border-left: 8px solid #f7b731;
            padding-left: 15px;
        }
        .meal-block {
            margin-bottom: 12px;
            background: #eadbbd;
            border-radius: 25px;
            padding: 10px 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .meal-block p {
            margin: 4px 0;
            color: #1e3c2c;
        }
        .meal-block strong {
            color: #1e4a2a;
        }
        .total-section {
            margin-top: 40px;
            background: #d9c5a6;
            border-radius: 50px;
            padding: 25px 30px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }
        .total-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1d3a1d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .total-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        .total-item {
            background: #fcf9ec;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 1.1rem;
            color: #1e3c2c;
            box-shadow: 0 4px 0 #8f6f4b, 0 5px 12px rgba(0,0,0,0.1);
            border: 1px solid #e5caa0;
        }
        .total-item .gram {
            float: right;
            font-size: 1.2rem;
            font-weight: 600;
            color: #944e1f;
        }
        .footer-note {
            margin-top: 30px;
            background: #b38b5f;
            border-radius: 50px;
            padding: 14px 28px;
            color: #fff9e0;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>🥾</span> BackpackRation · Случайное меню
        <span>⚖️</span>
    </h1>

    <div class="form-row">
        <div class="field">
            <label>🌲 Тип похода</label>
            <select id="tripType">
                <option value="water">Водный</option>
                <option value="mountain" selected>Горный</option>
                <option value="forest">Лесной</option>
                <option value="desert">Пустынный</option>
            </select>
        </div>
        <div class="field">
            <label>📆 Дней</label>
            <input type="number" id="daysCount" min="1" max="14" value="7">
        </div>
        <div class="field">
            <label>👥 Участников</label>
            <input type="number" id="membersCount" min="1" max="20" value="4">
        </div>
        <div class="field">
            <label>🚶 Км/день</label>
            <input type="number" id="kmPerDay" min="5" max="50" value="20">
        </div>
        <div class="field">
            <label>⛰️ Высота (м)</label>
            <input type="number" id="altitude" min="0" max="5000" value="1000">
        </div>
        <div class="field">
            <label>🔥 Способ</label>
            <select id="cookingMethod">
                <option value="gas">Газ</option>
                <option value="fire">Костёр</option>
            </select>
        </div>
        <button id="generateBtn">✨ Сгенерировать новое меню</button>
    </div>

    <div class="type-hint" id="typeHint">
        ⛰️ Коррекция веса по нагрузке и высоте.
    </div>

    <!-- Блок с меню по дням -->
    <div id="menuArea">
        <div class="result-title">🍽️ Меню по дням (случайное)</div>
        <div class="menu-days" id="menuGrid"></div>
    </div>

    <!-- Блок общего списка продуктов -->
    <div class="total-section" id="totalSection" style="display: none;">
        <div class="total-title">📦 Общий список продуктов на всех</div>
        <div class="total-list" id="totalList"></div>
    </div>

    <div class="footer-note">
        ⚡ К каждому приёму: хлебец (20 г), чай (2 г), сахар (10 г), сладкое (15 г)<br>
        Вес скорректирован с учётом километража, высоты и способа приготовления.
    </div>
</div>

<script>
    (function() {
        // ---------- БАЗОВЫЕ ПРОДУКТЫ ----------
        const products = {
            // Каши (завтрак)
            porridge: { name: "Овсянка", baseWeight: 40, category: "porridge" },
            milkPowder: { name: "Сухое молоко", baseWeight: 8, category: "breakfastAddon" },
            // Сухофрукты (добавки к завтраку)
            driedBananas: { name: "Сушеные бананы", baseWeight: 10, category: "breakfastAddon" },
            driedApples: { name: "Сушеные яблоки", baseWeight: 10, category: "breakfastAddon" },
            candiedFruits: { name: "Цукаты", baseWeight: 10, category: "breakfastAddon" },
            // Сыр, колбаса
            cheese: { name: "Сыр", baseWeight: 40, category: "spread" },
            sausage: { name: "Колбаса", baseWeight: 40, category: "spread" },
            // Гарниры (обеды/ужины)
            macaroni: { name: "Макароны", baseWeight: 50, category: "garnish" },
            rice: { name: "Рис", baseWeight: 50, category: "garnish" },
            buckwheat: { name: "Гречка", baseWeight: 50, category: "garnish" },
            mashed: { name: "Пюре картофельное", baseWeight: 50, category: "garnish" },
            // Супы пакетированные
            soupChicken: { name: "Суп куриный (пакет)", baseWeight: 30, category: "soup" },
            soupBorscht: { name: "Суп борщ (пакет)", baseWeight: 30, category: "soup" },
            soupPea: { name: "Суп гороховый (пакет)", baseWeight: 30, category: "soup" },
            // Сублимированные мясо и овощи
            subMeat: { name: "Сублимированное мясо", baseWeight: 15, category: "protein" },
            subVeg: { name: "Сублимированные овощи", baseWeight: 5, category: "protein" },
            subBeet: { name: "Свекла сублимированная", baseWeight: 5, category: "protein" },
            // Соусы / приправы
            soySauce: { name: "Соевый соус", baseWeight: 10, category: "condiment" },
            broth: { name: "Бульон", baseWeight: 5, category: "condiment" },
            salt: { name: "Соль", baseWeight: 3, category: "condiment" },
            spices: { name: "Специи", baseWeight: 2, category: "condiment" },
            // Хлебцы, чай, сахар, сладкое (на каждый приём)
            bread: { name: "Хлебец", baseWeight: 20, category: "bread" },
            tea: { name: "Чай", baseWeight: 2, category: "tea" },
            sugar: { name: "Сахар", baseWeight: 10, category: "sugar" },
            chocolate: { name: "Шоколад", baseWeight: 15, category: "sweet" },
            sweets: { name: "Сладкое (конфеты/печенье)", baseWeight: 15, category: "sweet" }
        };

        // Массивы для случайного выбора
        const breakfastAddons = [products.driedBananas, products.driedApples, products.candiedFruits];
        const garnishes = [products.macaroni, products.rice, products.buckwheat, products.mashed];
        const soups = [products.soupChicken, products.soupBorscht, products.soupPea];
        const subVegs = [products.subVeg, products.subBeet];
        const sweetsList = [products.chocolate, products.sweets];
        const condiments = [products.soySauce, products.broth, products.salt, products.spices]; // соль и специи всегда добавим отдельно

        // ---------- КОЭФФИЦИЕНТЫ НАГРУЗКИ ----------
        function getLoadFactors(km, altitude, method) {
            let baseFactor = 1.0;
            if (km > 25) baseFactor += 0.1;
            if (km > 35) baseFactor += 0.1;
            if (method === 'fire') baseFactor += 0.05;

            const altitudeFactor = altitude > 2000 ? 1.2 : 1.0;

            return {
                garnish: baseFactor * (altitude > 2000 ? 0.9 : 1.0),
                protein: baseFactor * altitudeFactor,
                spread: baseFactor * altitudeFactor,
                porridge: baseFactor,
                breakfastAddon: baseFactor,
                soup: baseFactor,
                condiment: baseFactor,
                bread: baseFactor,
                tea: baseFactor,
                sugar: baseFactor,
                sweet: baseFactor
            };
        }

        // Случайное изменение веса в пределах ±15%
        function varyWeight(base, factor = 1.0) {
            const variation = 0.85 + Math.random() * 0.3; // 0.85..1.15
            return Math.round(base * factor * variation);
        }

        // Генерация одного приёма (завтрак, обед, ужин) с учётом его специфики
        function generateMeal(mealType, factors, usedGarnish = null) {
            const mealProducts = [];

            // --- ОБЩИЕ ДЛЯ ВСЕХ ПРИЁМОВ: хлеб, чай, сахар, сладкое ---
            mealProducts.push({ name: products.bread.name, weight: varyWeight(products.bread.baseWeight, factors.bread) });
            mealProducts.push({ name: products.tea.name, weight: varyWeight(products.tea.baseWeight, factors.tea) });
            mealProducts.push({ name: products.sugar.name, weight: varyWeight(products.sugar.baseWeight, factors.sugar) });
            const sweet = sweetsList[Math.floor(Math.random() * sweetsList.length)];
            mealProducts.push({ name: sweet.name, weight: varyWeight(sweet.baseWeight, factors.sweet) });

            if (mealType === 'breakfast') {
                // Завтрак: каша, сухое молоко, добавка, сыр
                mealProducts.push({ name: products.porridge.name, weight: varyWeight(products.porridge.baseWeight, factors.porridge) });
                mealProducts.push({ name: products.milkPowder.name, weight: varyWeight(products.milkPowder.baseWeight, factors.breakfastAddon) });
                const addon = breakfastAddons[Math.floor(Math.random() * breakfastAddons.length)];
                mealProducts.push({ name: addon.name, weight: varyWeight(addon.baseWeight, factors.breakfastAddon) });
                mealProducts.push({ name: products.cheese.name, weight: varyWeight(products.cheese.baseWeight, factors.spread) });
            }
            else if (mealType === 'lunch') {
                // Обед: суп, гарнир, мясо, овощи, колбаса
                const soup = soups[Math.floor(Math.random() * soups.length)];
                mealProducts.push({ name: soup.name, weight: varyWeight(soup.baseWeight, factors.soup) });
                const garnish = garnishes[Math.floor(Math.random() * garnishes.length)];
                mealProducts.push({ name: garnish.name, weight: varyWeight(garnish.baseWeight, factors.garnish) });
                mealProducts.push({ name: products.subMeat.name, weight: varyWeight(products.subMeat.baseWeight, factors.protein) });
                const veg = subVegs[Math.floor(Math.random() * subVegs.length)];
                mealProducts.push({ name: veg.name, weight: varyWeight(veg.baseWeight, factors.protein) });
                mealProducts.push({ name: products.sausage.name, weight: varyWeight(products.sausage.baseWeight, factors.spread) });
                // запоминаем использованный гарнир для ужина (чтобы не повторять)
                usedGarnish = garnish;
            }
            else if (mealType === 'dinner') {
                // Ужин: гарнир (желательно не повторять обеденный), мясо, овощи, соус/бульон
                let garnish;
                if (usedGarnish) {
                    do {
                        garnish = garnishes[Math.floor(Math.random() * garnishes.length)];
                    } while (garnish.name === usedGarnish.name && garnishes.length > 1);
                } else {
                    garnish = garnishes[Math.floor(Math.random() * garnishes.length)];
                }
                mealProducts.push({ name: garnish.name, weight: varyWeight(garnish.baseWeight, factors.garnish) });
                mealProducts.push({ name: products.subMeat.name, weight: varyWeight(products.subMeat.baseWeight, factors.protein) });
                const veg = subVegs[Math.floor(Math.random() * subVegs.length)];
                mealProducts.push({ name: veg.name, weight: varyWeight(veg.baseWeight, factors.protein) });
                // Случайный кондимент (соус, бульон, соль, специи) – добавим один
                const condiment = condiments[Math.floor(Math.random() * condiments.length)];
                mealProducts.push({ name: condiment.name, weight: varyWeight(condiment.baseWeight, factors.condiment) });
            }

            return mealProducts;
        }

        // Генерация одного полного дня (возвращает объект с завтраком, обедом, ужином и общим списком)
        function generateRandomDay(factors) {
            // Сначала генерируем обед, чтобы знать его гарнир для ужина
            let usedGarnish = null;
            const lunchProducts = generateMeal('lunch', factors, usedGarnish);
            // Из обеда извлекаем гарнир (последний добавленный продукт с категорией garnish)
            const lunchGarnish = lunchProducts.find(p => 
                p.name === products.macaroni.name || p.name === products.rice.name || 
                p.name === products.buckwheat.name || p.name === products.mashed.name);
            if (lunchGarnish) usedGarnish = lunchGarnish;

            const breakfastProducts = generateMeal('breakfast', factors);
            const dinnerProducts = generateMeal('dinner', factors, usedGarnish);

            // Объединяем все продукты дня для подсчёта веса
            const allDayProducts = [...breakfastProducts, ...lunchProducts, ...dinnerProducts];

            return {
                breakfast: breakfastProducts,
                lunch: lunchProducts,
                dinner: dinnerProducts,
                all: allDayProducts
            };
        }

        // Форматирование карточки дня
        function formatDayDescription(dayMeals, dayIndex) {
            const breakfastList = dayMeals.breakfast.map(p => `${p.name} (${p.weight} г)`).join(', ');
            const lunchList = dayMeals.lunch.map(p => `${p.name} (${p.weight} г)`).join(', ');
            const dinnerList = dayMeals.dinner.map(p => `${p.name} (${p.weight} г)`).join(', ');

            return `<h3>День ${dayIndex+1}</h3>
                    <div class="meal-block"><strong>🌄 Завтрак:</strong> ${breakfastList}</div>
                    <div class="meal-block"><strong>☀️ Обед:</strong> ${lunchList}</div>
                    <div class="meal-block"><strong>🌙 Ужин:</strong> ${dinnerList}</div>`;
        }

        // Основная функция генерации и отображения
        function generateAndRender() {
            const days = parseInt(document.getElementById('daysCount').value) || 7;
            const members = parseInt(document.getElementById('membersCount').value) || 4;
            const km = parseFloat(document.getElementById('kmPerDay').value) || 20;
            const altitude = parseFloat(document.getElementById('altitude').value) || 1000;
            const method = document.getElementById('cookingMethod').value;

            const factors = getLoadFactors(km, altitude, method);

            document.getElementById('typeHint').innerHTML = `🏔️ Коррекция: углеводы ${Math.round(factors.garnish*100)}%, белки ${Math.round(factors.protein*100)}%, жиры ${Math.round(factors.spread*100)}%.`;

            const allDaysMeals = []; // массив объектов {breakfast, lunch, dinner, all}
            const menuGrid = document.getElementById('menuGrid');
            menuGrid.innerHTML = '';

            for (let i = 0; i < days; i++) {
                const dayMeals = generateRandomDay(factors);
                allDaysMeals.push(dayMeals);

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = formatDayDescription(dayMeals, i);
                menuGrid.appendChild(card);
            }

            // Суммируем все продукты на всех участников
            const totalMap = new Map();
            allDaysMeals.forEach(day => {
                day.all.forEach(product => {
                    const name = product.name;
                    const weightPerPerson = product.weight;
                    const totalWeight = weightPerPerson * members;
                    totalMap.set(name, (totalMap.get(name) || 0) + totalWeight);
                });
            });

            // Убедимся, что соль и специи присутствуют (они уже могут быть в ужине, но на всякий случай добавим)
            if (!totalMap.has('Соль')) totalMap.set('Соль', 3 * members * days);
            if (!totalMap.has('Специи')) totalMap.set('Специи', 2 * members * days);

            const sortedNames = Array.from(totalMap.keys()).sort((a,b) => a.localeCompare(b, 'ru'));
            const totalListDiv = document.getElementById('totalList');
            totalListDiv.innerHTML = '';
            sortedNames.forEach(name => {
                const weight = Math.round(totalMap.get(name));
                const itemDiv = document.createElement('div');
                itemDiv.className = 'total-item';
                itemDiv.innerHTML = `${name} <span class="gram">${weight} г</span>`;
                totalListDiv.appendChild(itemDiv);
            });

            document.getElementById('totalSection').style.display = 'block';
        }

        document.getElementById('generateBtn').addEventListener('click', generateAndRender);
        window.addEventListener('load', generateAndRender);
    })();
</script>
</body>
</html>
